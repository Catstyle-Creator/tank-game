<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; cursor: none; }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #e8f5e9;
            pointer-events: none;
            user-select: none;
            background: rgba(0,0,0,0.88);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 16px;
        }
        #level-display {
            font-size: 22px;
            font-weight: bold;
            color: #a5d6a7;
            text-shadow: 0 0 10px #4caf5088;
            margin-bottom: 6px;
        }
        #xp-bar-container {
            width: 200px;
            height: 12px;
            background: #2e2e2e;
            border-radius: 6px;
            border: 1px solid #4caf5055;
            overflow: hidden;
        }
        #xp-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #388e3c, #81c784);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        #xp-label { font-size: 12px; color: #81c784; margin-top: 4px; }
        #kill-count { margin-top: 10px; font-size: 14px; color: #ce93d8; }

        #weapon-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: none;
            user-select: none;
        }
        .weapon-slot {
            width: 64px;
            height: 64px;
            background: rgba(0,0,0,0.55);
            border: 2px solid #455a64;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #cfd8dc;
            font-size: 11px;
            text-align: center;
            position: relative;
        }
        .weapon-slot.active {
            border-color: #80cbc4;
            background: rgba(0,150,136,0.25);
            box-shadow: 0 0 12px #80cbc488;
        }
        .weapon-slot .icon { font-size: 22px; margin-bottom: 2px; }
        .weapon-slot .cooldown-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 0 0 6px 6px;
            height: 0%;
        }

        #weapon-pick {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #weapon-pick.visible { display: flex; }
        #weapon-pick h2 {
            color: #80cbc4;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 0 14px #80cbc4;
        }
        #weapon-pick p { color: #b0bec5; margin-bottom: 28px; font-size: 14px; }
        #weapon-options {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .weapon-card {
            width: 150px;
            background: #1e2a35;
            border: 2px solid #37474f;
            border-radius: 12px;
            padding: 18px 14px;
            color: #eceff1;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            pointer-events: all;
        }
        .weapon-card:hover {
            border-color: #80cbc4;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(128,203,196,0.3);
        }
        .weapon-card .wicon { font-size: 36px; margin-bottom: 10px; }
        .weapon-card h3 { font-size: 15px; color: #80cbc4; margin-bottom: 6px; }
        .weapon-card p { font-size: 11px; color: #90a4ae; line-height: 1.5; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="level-display">Level 1</div>
    <div id="xp-bar-container"><div id="xp-bar"></div></div>
    <div id="xp-label">0 / 6 XP</div>
    <div id="kill-count">Enemies defeated: 0</div>
</div>

<div id="weapon-bar"></div>

<div id="weapon-pick">
    <h2>⬆ LEVEL UP!</h2>
    <p id="weapon-pick-subtitle">Choose a weapon to add to your tank</p>
    <div id="weapon-options"></div>
</div>

<script>
// ════════════════════════════════════════════════
//  CANVAS SETUP
// ════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    buildStaticBackground();
});

// ════════════════════════════════════════════════
//  WORLD
// ════════════════════════════════════════════════
const WORLD_SIZE  = 6000;
const TILE_SIZE   = 60;
const BORDER_SIZE = 120;

// ════════════════════════════════════════════════
//  STATIC BACKGROUND
// ════════════════════════════════════════════════
const bgCanvas = document.createElement('canvas');
const bgCtx    = bgCanvas.getContext('2d');

function buildStaticBackground() {
    bgCanvas.width  = WORLD_SIZE;
    bgCanvas.height = WORLD_SIZE;
    const cols = Math.ceil(WORLD_SIZE / TILE_SIZE);
    const rows = Math.ceil(WORLD_SIZE / TILE_SIZE);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const rand = Math.sin(c * 127.1 + r * 311.7) * 43758.5453;
            const frac = rand - Math.floor(rand);
            let color;
            if      (frac < 0.12) color = '#5fa34e';
            else if (frac < 0.30) color = '#6aaa5a';
            else if (frac < 0.70) color = '#72b560';
            else if (frac < 0.88) color = '#7abd68';
            else                  color = '#68a856';
            bgCtx.fillStyle = color;
            bgCtx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
        }
    }

    bgCtx.strokeStyle = 'rgba(0,0,0,0.07)';
    bgCtx.lineWidth   = 0.6;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            bgCtx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    const wallColor   = '#6b6b6b';
    const mortarColor = '#4a4a4a';
    const stoneLight  = '#7a7a7a';
    const stoneDark   = '#555555';
    const brickW = 40, brickH = 20;

    const strips = [
        { x:0,                     y:0,                     w:WORLD_SIZE,  h:BORDER_SIZE },
        { x:0,                     y:WORLD_SIZE-BORDER_SIZE, w:WORLD_SIZE, h:BORDER_SIZE },
        { x:0,                     y:BORDER_SIZE,            w:BORDER_SIZE,h:WORLD_SIZE-BORDER_SIZE*2 },
        { x:WORLD_SIZE-BORDER_SIZE,y:BORDER_SIZE,            w:BORDER_SIZE,h:WORLD_SIZE-BORDER_SIZE*2 },
    ];

    for (const s of strips) {
        bgCtx.fillStyle = wallColor;
        bgCtx.fillRect(s.x, s.y, s.w, s.h);
        const rowsInStrip = Math.ceil(s.h / brickH) + 1;
        const colsInStrip = Math.ceil(s.w / brickW) + 2;
        for (let row = 0; row < rowsInStrip; row++) {
            const offset = (row % 2) * (brickW / 2);
            for (let col = -1; col < colsInStrip; col++) {
                const bx   = s.x + col * brickW - offset;
                const by   = s.y + row * brickH;
                const seed = Math.sin(bx * 0.3 + by * 0.7) * 100;
                const fr   = seed - Math.floor(seed);
                bgCtx.fillStyle = fr < 0.3 ? stoneDark : fr < 0.7 ? wallColor : stoneLight;
                bgCtx.fillRect(bx + 1, by + 1, brickW - 2, brickH - 2);
                bgCtx.strokeStyle = mortarColor;
                bgCtx.lineWidth   = 1.5;
                bgCtx.strokeRect(bx + 1, by + 1, brickW - 2, brickH - 2);
            }
        }
    }

    bgCtx.strokeStyle = 'rgba(0,0,0,0.55)';
    bgCtx.lineWidth   = 6;
    bgCtx.strokeRect(BORDER_SIZE, BORDER_SIZE, WORLD_SIZE-BORDER_SIZE*2, WORLD_SIZE-BORDER_SIZE*2);
    bgCtx.strokeStyle = 'rgba(255,255,255,0.08)';
    bgCtx.lineWidth   = 2;
    bgCtx.strokeRect(BORDER_SIZE+4, BORDER_SIZE+4, WORLD_SIZE-BORDER_SIZE*2-8, WORLD_SIZE-BORDER_SIZE*2-8);
}
buildStaticBackground();

function drawBackground() {
    ctx.drawImage(
        bgCanvas,
        camera.x - canvas.width  / 2,
        camera.y - canvas.height / 2,
        canvas.width, canvas.height,
        0, 0, canvas.width, canvas.height
    );
}

// ════════════════════════════════════════════════
//  CAMERA
// ════════════════════════════════════════════════
const camera = { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 };
function worldToScreen(wx, wy) {
    return { x: wx - camera.x + canvas.width/2, y: wy - camera.y + canvas.height/2 };
}

// ════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════
const mouse = { x: canvas.width/2, y: canvas.height/2, down: false };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button===0) mouse.down = true; });
canvas.addEventListener('mouseup',   e => { if (e.button===0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if ((e.key==='q'||e.key==='Q') && !weaponPickOpen) tryShootAll();
    const n = parseInt(e.key);
    if (n >= 1 && n <= playerWeapons.length) activeWeaponIndex = n - 1;
});

// ════════════════════════════════════════════════
//  WEAPON DEFINITIONS
// ════════════════════════════════════════════════
const WEAPON_DEFS = {
    main_cannon: {
        id:'main_cannon', name:'Cannon', icon:'🎯',
        desc:'Balanced cannon.\nSteady fire rate.',
        cooldown:280, damage:1, bulletSpeed:11, bulletRadius:5,
        bulletColor:'#fffde7', range:80, spread:0, count:1, type:'bullet'
    },
    railgun: {
        id:'railgun', name:'Railgun', icon:'⚡',
        desc:'High damage beam.\nSlow reload.\nPierces all enemies.',
        cooldown:1200, damage:5, bulletSpeed:28, bulletRadius:4,
        bulletColor:'#00e5ff', range:320, spread:0, count:1, type:'rail'
    },
    rocket: {
        id:'rocket', name:'Rockets', icon:'🚀',
        desc:'Slow projectile.\nExplodes on impact.',
        cooldown:1000, damage:3, bulletSpeed:5, bulletRadius:7,
        bulletColor:'#ff7043', range:140, spread:0, count:1,
        explosionRadius:80, type:'rocket'
    },
    machinegun: {
        id:'machinegun', name:'MachineGun', icon:'🔫',
        desc:'Fast fire rate.\nSlightly weaker per shot.',
        cooldown:120, damage:0.6, bulletSpeed:13, bulletRadius:3,
        bulletColor:'#fff176', range:70, spread:0.06, count:1, type:'bullet'
    },
    flak: {
        id:'flak', name:'Flak Gun', icon:'💥',
        desc:'Shotgun spread.\nShort range shrapnel.',
        cooldown:700, damage:0.8, bulletSpeed:9, bulletRadius:3,
        bulletColor:'#607d8b', range:35, spread:0.35, count:7, type:'flak'
    }
};

// ════════════════════════════════════════════════
//  PLAYER
// ════════════════════════════════════════════════
const player = {
    x: WORLD_SIZE/2, y: WORLD_SIZE/2,
    angle: 0, speed: 0, maxSpeed: 3.5,
    bodyRadius: 22, hp: 100, maxHp: 100,
    trackFrame: 0   // for track animation
};

let playerWeapons     = [{ ...WEAPON_DEFS.main_cannon, lastShot:0, stackCount:1 }];
let activeWeaponIndex = 0;
let weaponPickOpen    = false;

function updatePlayer() {
    const cx = canvas.width/2, cy = canvas.height/2;
    const dx = mouse.x - cx,   dy = mouse.y - cy;
    const dist = Math.hypot(dx, dy);
    player.angle = Math.atan2(dy, dx);
    const deadzone = 10, fullSpeed = 120;
    player.speed = dist > deadzone
        ? Math.min((dist-deadzone)/(fullSpeed-deadzone),1) * player.maxSpeed : 0;

    const nx = player.x + Math.cos(player.angle) * player.speed;
    const ny = player.y + Math.sin(player.angle) * player.speed;
    player.x = Math.max(BORDER_SIZE+30, Math.min(WORLD_SIZE-BORDER_SIZE-30, nx));
    player.y = Math.max(BORDER_SIZE+30, Math.min(WORLD_SIZE-BORDER_SIZE-30, ny));
    camera.x  = player.x;
    camera.y  = player.y;

    // Animate tracks when moving
    if (player.speed > 0.1) player.trackFrame += player.speed * 0.4;
}

// ════════════════════════════════════════════════
//  TANK DRAWING
// ════════════════════════════════════════════════
const T = {
    outline:   '#1a1a1a',
    darkPlate: '#b0b8c0',
    midPlate:  '#d4dce4',
    lightPlate:'#eef2f6',
    white:     '#f5f8fa',
    shadow:    '#8898a8',
    accent:    '#7ecfff',
    trackDark: '#2a2a2a',
    trackMid:  '#444444',
    trackLight:'#666666',
    trackSeg:  '#555555',
};

function px(ctx, x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawTank() {
    const { x:sx, y:sy } = worldToScreen(player.x, player.y);
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(player.angle);

    // Shadow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle   = '#000';
    ctx.beginPath();
    ctx.ellipse(5, 5, 32, 25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // ── Animated tracks ──
    drawTrack(ctx, -28, -28, 56, 11);   // left track
    drawTrack(ctx, -28,  17, 56, 11);   // right track

    // ── Hull ──
    px(ctx, -24,-17, 48,34, T.outline);
    px(ctx, -23,-16, 46,32, T.darkPlate);
    px(ctx, -21,-14, 42,28, T.midPlate);
    px(ctx,  12,-14, 11,28, T.lightPlate);
    px(ctx, -23,-14,  8,28, T.shadow);
    px(ctx, -23, -1, 46, 2, T.outline);
    px(ctx,   4,-14,  2,28, T.outline);

    // Rivets
    for (const [rx,ry] of [[-19,-12],[-19,10],[20,-12],[20,10],[6,-12],[6,10]]) {
        px(ctx, rx, ry, 3, 3, T.lightPlate);
        px(ctx, rx+1, ry+1, 1, 1, T.white);
    }

    // Exhaust vents
    for (let i = 0; i < 3; i++) {
        px(ctx, -23,-12+i*9, 5,6, T.outline);
        px(ctx, -22,-11+i*9, 3,4, T.trackMid);
    }

    // Front armour lip
    px(ctx, 20,-16, 4,32, T.lightPlate);
    px(ctx, 22,-16, 2,32, T.white);

    // ── Turret ring ──
    px(ctx, -12,-12, 24,24, T.outline);
    px(ctx, -11,-11, 22,22, T.shadow);
    px(ctx, -10,-10, 20,20, T.midPlate);
    px(ctx, -10,-10, 20, 4, T.lightPlate);
    px(ctx, -10,-10,  4,20, T.lightPlate);

    // ── Turret body ──
    px(ctx,  -8, -9, 22,18, T.outline);
    px(ctx,  -7, -8, 20,16, T.midPlate);
    px(ctx,  -7, -8, 20, 5, T.lightPlate);
    px(ctx,  -7, -8,  5,16, T.lightPlate);
    px(ctx,  -2, -3,  8, 6, T.outline);
    px(ctx,  -1, -2,  6, 4, T.darkPlate);
    px(ctx,  -1, -2,  6, 2, T.shadow);
    px(ctx,  -7,  2, 20, 3, T.accent);

    // ── Weapon visuals ──
    drawWeaponBarrels(ctx);

    ctx.restore();

    drawBar(sx, sy-46, 56, 7, player.hp/player.maxHp, '#ef5350', '#b71c1c');
}

function drawTrack(ctx, tx, ty, tw, th) {
    // Track base
    px(ctx, tx, ty, tw, th, T.trackDark);

    // Animated segments — scroll offset based on trackFrame
    const segW   = 8;
    const offset = Math.round(player.trackFrame % segW);
    const count  = Math.ceil(tw / segW) + 2;

    ctx.save();
    // Clip to track bounds
    ctx.beginPath();
    ctx.rect(tx, ty, tw, th);
    ctx.clip();

    for (let i = -1; i < count; i++) {
        const sx = tx + i * segW - offset;
        // Alternate segment shading
        const shade = (i % 2 === 0) ? T.trackMid : T.trackSeg;
        px(ctx, sx+1, ty+1, segW-2, th-2, shade);
        // Segment border
        ctx.strokeStyle = T.trackDark;
        ctx.lineWidth   = 0.8;
        ctx.strokeRect(Math.round(sx+1), Math.round(ty+1), segW-2, th-2);
    }

    // Top highlight strip
    px(ctx, tx, ty, tw, 2, T.trackLight);
    // Bottom shadow strip
    px(ctx, tx, ty+th-2, tw, 2, '#1a1a1a');

    ctx.restore();

    // Wheel hubs over track ends
    for (const wx of [tx+5, tx+tw/2, tx+tw-5]) {
        px(ctx, wx-4, ty+1, 8, th-2, T.outline);
        px(ctx, wx-3, ty+2, 6, th-4, T.darkPlate);
        px(ctx, wx-2, ty+3, 4, 2,   T.lightPlate);
    }
}

function drawWeaponBarrels(ctx) {
    const railW  = playerWeapons.find(w => w.id==='railgun');
    const hasRocket  = playerWeapons.find(w => w.id==='rocket');
    const hasMG      = playerWeapons.find(w => w.id==='machinegun');
    const hasFlak    = playerWeapons.find(w => w.id==='flak');
    const hasCannon  = playerWeapons.find(w => w.id==='main_cannon');

    // ── Main cannon ──
    if (hasCannon) {
        const stacks = hasCannon.stackCount || 1;
        // For each stack, slightly offset barrel vertically
        for (let s = 0; s < stacks; s++) {
            const yOff = (s - (stacks-1)/2) * 6;
            px(ctx, 14, -4+yOff, 26, 8, T.outline);
            px(ctx, 15, -3+yOff, 24, 6, T.midPlate);
            px(ctx, 15, -3+yOff, 24, 2, T.white);
            px(ctx, 36, -5+yOff,  6,10, T.outline);
            px(ctx, 37, -4+yOff,  4, 8, T.darkPlate);
            px(ctx, 37, -4+yOff,  4, 2, T.lightPlate);
        }
    }

    // ── Railgun — thick barrel, grows with stacks ──
    if (railW) {
        const stacks    = railW.stackCount || 1;
        const thickness = 6 + stacks * 3;   // gets thicker per stack
        const halfT     = Math.floor(thickness/2);
        // Barrel body
        px(ctx, 14, -halfT, 34, thickness, T.outline);
        px(ctx, 15, -halfT+1, 32, thickness-2, '#1a3a4a');
        // Coils — taller per stack
        const coilColor = '#00e5ff';
        for (let i = 0; i < 6; i++) {
            px(ctx, 16+i*5, -halfT-1, 3, thickness+2, T.outline);
            px(ctx, 17+i*5, -halfT,   1, thickness,   coilColor);
        }
        // Glowing tip
        px(ctx, 46, -halfT+1, 4, thickness-2, coilColor);
        px(ctx, 47, -halfT+2, 2, thickness-4, '#ffffff');
        // Side reinforcement struts
        for (let s = 1; s < stacks; s++) {
            px(ctx, 14+s*8, -halfT-3, 6, 3, T.darkPlate);
            px(ctx, 14+s*8, halfT,    6, 3, T.darkPlate);
        }
    }

    // ── Machine gun — twin barrels, more pairs per stack ──
    if (hasMG) {
        const stacks = hasMG.stackCount || 1;
        for (let s = 0; s < stacks; s++) {
            // Each stack adds a pair of barrels, spread outward
            const spread = (s+1) * 10;
            // Upper barrel
            px(ctx, 10, -spread-2, 28, 4, T.outline);
            px(ctx, 11, -spread-1, 26, 2, T.lightPlate);
            px(ctx, 11, -spread-1, 26, 1, T.white);
            // Lower barrel (mirror)
            px(ctx, 10,  spread-2, 28, 4, T.outline);
            px(ctx, 11,  spread-1, 26, 2, T.lightPlate);
            px(ctx, 11,  spread-1, 26, 1, T.white);
            // MG mount
            px(ctx,  8, -spread-4, 10, 6, T.outline);
            px(ctx,  9, -spread-3,  8, 4, T.shadow);
            px(ctx,  8,  spread-2, 10, 6, T.outline);
            px(ctx,  9,  spread-1,  8, 4, T.shadow);
        }
    }

    // ── Rocket launcher pods on rear — one pod per stack ──
    if (hasRocket) {
        const stacks = hasRocket.stackCount || 1;
        for (let s = 0; s < stacks; s++) {
            const yOff = (s - (stacks-1)/2) * 18;
            // Pod body on rear
            px(ctx, -26, -8+yOff, 12,16, T.outline);
            px(ctx, -25, -7+yOff, 10,14, '#3e2723');
            px(ctx, -25, -7+yOff, 10, 4, '#5d4037');
            // Tube openings
            px(ctx, -26, -5+yOff, 4,4, T.outline);
            px(ctx, -25, -4+yOff, 2,2, '#1a0a00');
            px(ctx, -26,  1+yOff, 4,4, T.outline);
            px(ctx, -25,  2+yOff, 2,2, '#1a0a00');
            // Forward pipes
            px(ctx, -14, -4+yOff, 18,4, T.outline);
            px(ctx, -13, -3+yOff, 16,2, '#5d4037');
            px(ctx, -14,  0+yOff, 18,4, T.outline);
            px(ctx, -13,  1+yOff, 16,2, '#5d4037');
        }
    }

    // ── Flak — short flared muzzle below, stacks add tubes ──
    if (hasFlak) {
        const stacks = hasFlak.stackCount || 1;
        for (let s = 0; s < stacks; s++) {
            const yOff = 6 + s * 12;
            px(ctx, 10, yOff,    16,10, T.outline);
            px(ctx, 11, yOff+1,  14, 8, '#4a148c');
            px(ctx, 11, yOff+1,  14, 2, '#6a1b9a');
            px(ctx, 24, yOff-2,  10,14, T.outline);
            px(ctx, 25, yOff-1,   8,12, '#6a1b9a');
            px(ctx, 28, yOff+1,   4, 8, '#1a0033');
            px(ctx, 29, yOff+2,   2, 6, '#000000');
        }
    }
}

// ════════════════════════════════════════════════
//  SHOOTING
// ════════════════════════════════════════════════
const bullets = [];

function tryShootAll() {
    if (weaponPickOpen) return;
    playerWeapons.forEach((_,i) => tryShootWeapon(i));
}

function tryShootWeapon(index) {
    const w   = playerWeapons[index];
    const now = Date.now();
    if (now - (w.lastShot||0) < w.cooldown) return;
    w.lastShot = now;

    const stacks = w.stackCount || 1;

    if (w.type === 'rail') {
        // One beam per stack, slightly spread
        for (let s = 0; s < stacks; s++) {
            const angleOff = (s - (stacks-1)/2) * 0.04;
            const angle    = player.angle + angleOff;
            const tip      = 48;
            bullets.push({
                x:  player.x + Math.cos(angle)*tip,
                y:  player.y + Math.sin(angle)*tip,
                vx: Math.cos(angle)*w.bulletSpeed,
                vy: Math.sin(angle)*w.bulletSpeed,
                life: w.range, maxLife: w.range,
                radius: w.bulletRadius + (w.stackCount-1)*2,
                color: w.bulletColor,
                damage: w.damage, type: w.type,
                explRadius: 0, trail: [],
                hitEnemies: new Set(),   // track which enemies already hit
                beamWidth: 4 + (w.stackCount||1) * 3
            });
        }
        return;
    }

    if (w.type === 'rocket') {
        // Rockets: stacks = more rockets per shot, spread slightly
        for (let s = 0; s < stacks; s++) {
            const angleOff = (s - (stacks-1)/2) * 0.12;
            const angle    = player.angle + angleOff;
            const tip      = 42;
            bullets.push({
                x:  player.x + Math.cos(angle)*tip,
                y:  player.y + Math.sin(angle)*tip,
                vx: Math.cos(angle)*w.bulletSpeed,
                vy: Math.sin(angle)*w.bulletSpeed,
                life: w.range, maxLife: w.range,
                radius: w.bulletRadius, color: w.bulletColor,
                damage: w.damage, type: w.type,
                explRadius: w.explosionRadius||0, trail: [],
                hitEnemies: new Set()
            });
        }
        return;
    }

    if (w.type === 'bullet' || w.type === 'flak') {
        for (let s = 0; s < w.count; s++) {
            const spread   = (Math.random()-0.5)*w.spread*2;
            // For machinegun stacks: spread out multiple streams
            let stackAngleOff = 0;
            if (w.id === 'machinegun' && stacks > 1) {
                stackAngleOff = (Math.floor(s / w.count) - (stacks-1)/2) * 0.12;
            }
            const angle = player.angle + spread + stackAngleOff;
            const tip   = 42;
            bullets.push({
                x:  player.x + Math.cos(angle)*tip,
                y:  player.y + Math.sin(angle)*tip,
                vx: Math.cos(angle)*w.bulletSpeed,
                vy: Math.sin(angle)*w.bulletSpeed,
                life: w.range, maxLife: w.range,
                radius: w.bulletRadius, color: w.bulletColor,
                damage: w.damage, type: w.type,
                explRadius: w.explosionRadius||0, trail: [],
                hitEnemies: new Set()
            });
        }
        // Extra bullet streams for stacked machinegun
        if (w.id === 'machinegun' && stacks > 1) {
            for (let extra = 1; extra < stacks; extra++) {
                for (let s = 0; s < w.count; s++) {
                    const spread   = (Math.random()-0.5)*w.spread*2;
                    const angleOff = (extra - (stacks-1)/2) * 0.14;
                    const angle    = player.angle + spread + angleOff;
                    const tip      = 42;
                    bullets.push({
                        x:  player.x + Math.cos(angle)*tip,
                        y:  player.y + Math.sin(angle)*tip,
                        vx: Math.cos(angle)*w.bulletSpeed,
                        vy: Math.sin(angle)*w.bulletSpeed,
                        life: w.range, maxLife: w.range,
                        radius: w.bulletRadius, color: w.bulletColor,
                        damage: w.damage, type: w.type,
                        explRadius: 0, trail: [],
                        hitEnemies: new Set()
                    });
                }
            }
        }
    }
}

function handleAutoFire() {
    if (mouse.down && !weaponPickOpen) tryShootAll();
}

function updateBullets() {
    for (let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        b.trail.push({ x:b.x, y:b.y });
        // Rail keeps full trail, others keep short
        if (b.type !== 'rail' && b.trail.length > 7) b.trail.shift();

        b.x += b.vx; b.y += b.vy;
        b.life--;

        if (b.life <= 0) {
            if (b.type==='rocket') triggerExplosion(b.x, b.y, b.explRadius, b.damage);
            bullets.splice(i, 1);
            continue;
        }

        let hit = false;
        for (let j = enemies.length-1; j >= 0; j--) {
            const e  = enemies[j];
            const dx = b.x - e.x, dy = b.y - e.y;
            if (Math.hypot(dx,dy) < e.radius + b.radius) {
                // Rail: only damage each enemy once per shot
                if (b.type === 'rail') {
                    if (!b.hitEnemies.has(j)) {
                        b.hitEnemies.add(j);
                        damageEnemy(j, b.damage);
                        spawnHitParticles(e.x, e.y, e.color);
                    }
                    // Rail never stops
                } else if (b.type === 'rocket') {
                    triggerExplosion(b.x, b.y, b.explRadius, b.damage);
                    hit = true; break;
                } else {
                    damageEnemy(j, b.damage);
                    spawnHitParticles(e.x, e.y, e.color);
                    hit = true; break;
                }
            }
        }
        if (hit) bullets.splice(i, 1);
    }
}

function triggerExplosion(wx, wy, radius, damage) {
    spawnExplosionParticles(wx, wy);
    for (let j = enemies.length-1; j >= 0; j--) {
        if (Math.hypot(wx-enemies[j].x, wy-enemies[j].y) < radius+enemies[j].radius)
            damageEnemy(j, damage*3);
    }
}

function drawBullets() {
    for (const b of bullets) {

        // ── Railgun beam ──
        if (b.type === 'rail') {
            const origin = b.trail.length > 0 ? b.trail[0] : { x:b.x, y:b.y };
            const { x:ox, y:oy } = worldToScreen(origin.x, origin.y);
            const { x:hx, y:hy } = worldToScreen(b.x, b.y);
            const lifeFrac = b.life / b.maxLife;
            const bw       = b.beamWidth || 8;

            ctx.save();
            ctx.lineCap = 'round';

            // Outer glow — fades faster (trail drops off)
            const beamGrad = ctx.createLinearGradient(ox,oy,hx,hy);
            beamGrad.addColorStop(0,   `rgba(0,229,255,0)`);
            beamGrad.addColorStop(0.35,`rgba(0,229,255,${0.10*lifeFrac})`);
            beamGrad.addColorStop(1,   `rgba(0,229,255,${0.75*lifeFrac})`);
            ctx.strokeStyle = beamGrad;
            ctx.lineWidth   = bw * 3.5;
            ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(hx,hy); ctx.stroke();

            // Mid glow
            const midGrad = ctx.createLinearGradient(ox,oy,hx,hy);
            midGrad.addColorStop(0,   `rgba(150,240,255,0)`);
            midGrad.addColorStop(0.45,`rgba(150,240,255,${0.28*lifeFrac})`);
            midGrad.addColorStop(1,   `rgba(200,248,255,${0.9*lifeFrac})`);
            ctx.strokeStyle = midGrad;
            ctx.lineWidth   = bw * 1.4;
            ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(hx,hy); ctx.stroke();

            // Bright core
            const coreGrad = ctx.createLinearGradient(ox,oy,hx,hy);
            coreGrad.addColorStop(0,   `rgba(255,255,255,0)`);
            coreGrad.addColorStop(0.55,`rgba(255,255,255,${0.5*lifeFrac})`);
            coreGrad.addColorStop(1,   `rgba(255,255,255,${lifeFrac})`);
            ctx.strokeStyle = coreGrad;
            ctx.lineWidth   = bw * 0.5;
            ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(hx,hy); ctx.stroke();

            // Leading tip burst
            const tipR = (bw*2.5)*lifeFrac;
            const tipGrd = ctx.createRadialGradient(hx,hy,0,hx,hy,tipR);
            tipGrd.addColorStop(0,   `rgba(255,255,255,${0.9*lifeFrac})`);
            tipGrd.addColorStop(0.4, `rgba(0,229,255,${0.6*lifeFrac})`);
            tipGrd.addColorStop(1,   `rgba(0,229,255,0)`);
            ctx.fillStyle = tipGrd;
            ctx.beginPath(); ctx.arc(hx,hy,tipR,0,Math.PI*2); ctx.fill();

            ctx.restore();
            continue;
        }

        // Normal trail
        for (let t = 0; t < b.trail.length; t++) {
            const tr = b.trail[t];
            const { x:sx, y:sy } = worldToScreen(tr.x, tr.y);
            ctx.globalAlpha = (t/b.trail.length)*0.45;
            ctx.fillStyle   = b.color;
            ctx.beginPath(); ctx.arc(sx,sy,b.radius*0.55,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        const { x:sx, y:sy } = worldToScreen(b.x, b.y);

        if (b.type === 'rocket') {
            ctx.save(); ctx.translate(sx,sy); ctx.rotate(Math.atan2(b.vy,b.vx));
            ctx.fillStyle='#ff7043'; ctx.fillRect(-8,-3,16,6);
            ctx.fillStyle='#ffccbc';
            ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(4,-4); ctx.lineTo(4,4); ctx.closePath(); ctx.fill();
            ctx.fillStyle='#ffeb3b';
            ctx.beginPath(); ctx.arc(-9,0,4,0,Math.PI*2); ctx.fill();
            ctx.restore();
        } else if (b.type === 'flak') {
            ctx.save(); ctx.translate(sx,sy); ctx.rotate(Math.atan2(b.vy,b.vx));
            ctx.fillStyle = '#607d8b';
            ctx.beginPath(); ctx.moveTo(b.radius*1.5,0); ctx.lineTo(-b.radius,-b.radius); ctx.lineTo(-b.radius,b.radius); ctx.closePath(); ctx.fill();
            ctx.restore();
        } else {
            const grd = ctx.createRadialGradient(sx,sy,0,sx,sy,b.radius*2.5);
            grd.addColorStop(0,b.color+'ee'); grd.addColorStop(1,b.color+'00');
            ctx.fillStyle=grd;
            ctx.beginPath(); ctx.arc(sx,sy,b.radius*2.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fffde7';
            ctx.beginPath(); ctx.arc(sx,sy,b.radius,0,Math.PI*2); ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

const enemies   = [];
const MAX_ENEMIES = 100;
let   killCount   = 0;

// Tier unlock thresholds (player level needed)
const TIER_UNLOCK = [0, 0, 4, 7, 10, 13, 16, 19, 22, 25, 28];

// Max cluster sizes per tier
function maxCluster(tier) {
    if (tier <= 2)  return 8;
    if (tier <= 4)  return 4;
    if (tier <= 6)  return 2;
    return 1;
}

// Spawn weight — higher tiers get rarer as tier goes up
function tierWeight(tier) {
    if (tier <= 2) return 18;
    if (tier === 3) return 12;
    if (tier === 4) return 8;
    if (tier === 5) return 5;
    if (tier === 6) return 3.5;
    if (tier === 7) return 2.2;
    if (tier === 8) return 1.4;
    if (tier === 9) return 0.8;
    if (tier === 10) return 0.4;
    return 1;
}

function availableEnemyDefs() {
    return ENEMY_DEFS.filter(d => level >= TIER_UNLOCK[d.tier]);
}

function spawnCluster() {
    if (enemies.length >= MAX_ENEMIES) return;

    const pool = availableEnemyDefs();
    if (pool.length === 0) return;

    // Pick weighted random def
    const weighted = [];
    pool.forEach(d => {
        const w = tierWeight(d.tier);
        const n = Math.max(1, Math.round(w * 5));
        for (let i = 0; i < n; i++) weighted.push(d);
    });
    const def = weighted[Math.floor(Math.random() * weighted.length)];

    // Cluster size
    const clusterMax  = maxCluster(def.tier);
    const clusterSize = Math.floor(Math.random() * clusterMax) + 1;

    // Pick cluster center far from player
    let cx, cy, attempts = 0;
    do {
        cx = Math.random()*(WORLD_SIZE-BORDER_SIZE*2-200)+BORDER_SIZE+100;
        cy = Math.random()*(WORLD_SIZE-BORDER_SIZE*2-200)+BORDER_SIZE+100;
        attempts++;
    } while (Math.hypot(cx-player.x, cy-player.y) < 400 && attempts < 25);

    const clusterSpread = 60 + def.radius * 2.5;

    for (let i = 0; i < clusterSize; i++) {
        if (enemies.length >= MAX_ENEMIES) break;
        const a  = Math.random()*Math.PI*2;
        const d  = Math.random()*clusterSpread;
        const ex = cx + Math.cos(a)*d;
        const ey = cy + Math.sin(a)*d;

        enemies.push({
            ...def,
            x: ex, y: ey, hp: def.hpMax,
            angle: Math.random()*Math.PI*2,
            flashTimer: 0,
            spawnX: ex, spawnY: ey,
            roamAngle: Math.random()*Math.PI*2,
            roamTimer: Math.floor(Math.random()*120),
            roamRadius: 70 + Math.random()*70,
            roamSpeed:  0.25 + Math.random()*0.35,
        });
    }
}

function updateEnemies() {
    for (const e of enemies) {
        e.roamTimer--;
        if (e.roamTimer <= 0) {
            e.roamAngle = Math.random()*Math.PI*2;
            e.roamTimer = 60 + Math.floor(Math.random()*120);
        }
        const nx = e.x + Math.cos(e.roamAngle)*e.roamSpeed;
        const ny = e.y + Math.sin(e.roamAngle)*e.roamSpeed;
        const dx = nx - e.spawnX, dy = ny - e.spawnY;
        if (Math.hypot(dx,dy) < e.roamRadius) { e.x=nx; e.y=ny; }
        else { e.roamAngle = Math.atan2(e.spawnY-e.y, e.spawnX-e.x)+(Math.random()-0.5)*0.5; }
        e.angle += 0.005;
        if (e.flashTimer > 0) e.flashTimer--;
    }
}

function damageEnemy(index, dmg) {
    const e = enemies[index];
    if (!e) return;
    e.hp -= dmg;
    e.flashTimer = 6;
    if (e.hp <= 0) killEnemy(index);
}

function killEnemy(index) {
    const e = enemies[index];
    spawnOrbs(e.x, e.y, e.orbs, e.color);
    spawnDeathParticles(e.x, e.y, e.color);
    enemies.splice(index, 1);
    killCount++;
    document.getElementById('kill-count').textContent = `Enemies defeated: ${killCount}`;
}

function drawEnemy(e) {
    const { x:sx, y:sy } = worldToScreen(e.x, e.y);
    const pad = e.radius+10;
    if (sx<-pad||sx>canvas.width+pad||sy<-pad||sy>canvas.height+pad) return;

    ctx.save();
    ctx.translate(sx,sy);
    ctx.rotate(e.angle);
    ctx.fillStyle   = e.flashTimer>0 ? '#ffffff' : e.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth   = 2.5;
    drawPolygon(ctx, e.sides, e.radius);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.13)';
    drawPolygon(ctx, e.sides, e.radius*0.55);
    ctx.fill();
    ctx.restore();

    drawBar(sx, sy-e.radius-12, e.radius*2, 6, e.hp/e.hpMax, '#66bb6a', '#1b5e20');
}

function drawPolygon(ctx, sides, r) {
    ctx.beginPath();
    for (let i=0; i<sides; i++) {
        const a=(i/sides)*Math.PI*2-Math.PI/2;
        i===0 ? ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r)
              : ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();
}

// ════════════════════════════════════════════════
//  ORBS
// ════════════════════════════════════════════════
const orbs = [];

function spawnOrbs(x,y,count,color) {
    for (let i=0;i<count;i++) {
        const a=Math.random()*Math.PI*2, d=Math.random()*30+10;
        orbs.push({ x:x+Math.cos(a)*d, y:y+Math.sin(a)*d,
                    radius:6, color, pulse:Math.random()*Math.PI*2 });
    }
}

function updateOrbs() {
    for (let i=orbs.length-1;i>=0;i--) {
        const o=orbs[i];
        o.pulse+=0.08;
        const dx=player.x-o.x, dy=player.y-o.y, d=Math.hypot(dx,dy);
        if (d<130) { o.x+=(dx/d)*3.8; o.y+=(dy/d)*3.8; }
        if (d<38)  collectOrb(i);
    }
}

function drawOrbs() {
    for (const o of orbs) {
        const{x:sx,y:sy}=worldToScreen(o.x,o.y);
        if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20) continue;
        const r=o.radius+Math.sin(o.pulse)*2;
        const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r*2.5);
        g.addColorStop(0,o.color+'cc'); g.addColorStop(1,o.color+'00');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,r*2.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=o.color; ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.arc(sx-r*0.3,sy-r*0.3,r*0.35,0,Math.PI*2); ctx.fill();
    }
}

// ════════════════════════════════════════════════
//  XP / LEVELING
// ════════════════════════════════════════════════
let xp=0, level=1;
function xpNeeded(lvl) { return Math.floor(6*Math.pow(1.45,lvl-1)); }

function collectOrb(index) {
    orbs.splice(index,1); xp++;
    if (xp>=xpNeeded(level)) { xp-=xpNeeded(level); level++; onLevelUp(); }
    updateXpUI();
}

function onLevelUp() {
    spawnLevelUpEffect(); updateXpUI();
    if (level%2===0) showWeaponPick();
}

function updateXpUI() {
    const needed=xpNeeded(level);
    document.getElementById('level-display').textContent=`Level ${level}`;
    document.getElementById('xp-bar').style.width=`${(xp/needed)*100}%`;
    document.getElementById('xp-label').textContent=`${xp} / ${needed} XP`;
}

// ════════════════════════════════════════════════
//  WEAPON PICK UI
// ════════════════════════════════════════════════
function showWeaponPick() {
    weaponPickOpen=true; mouse.down=false;
    const overlay =document.getElementById('weapon-pick');
    const subtitle=document.getElementById('weapon-pick-subtitle');
    const options =document.getElementById('weapon-options');
    options.innerHTML='';
    const isFirst=playerWeapons.length===1&&playerWeapons[0].id==='main_cannon';
    subtitle.textContent=isFirst?'Choose your primary weapon type':'Add or upgrade a weapon';
    const available=Object.values(WEAPON_DEFS).filter(w=>w.id!=='main_cannon');
    if(available.length===0){weaponPickOpen=false;return;}
    available.forEach(def=>{
        const existing=playerWeapons.find(w=>w.id===def.id);
        const card=document.createElement('div');
        card.className='weapon-card';
        const stackInfo=existing?`<p style="color:#80cbc4;margin-top:4px;">Currently: x${existing.stackCount||1} — Upgrade!</p>`:'';
        card.innerHTML=`<div class="wicon">${def.icon}</div><h3>${def.name}</h3><p>${def.desc}</p>${stackInfo}`;
        card.addEventListener('click',()=>pickWeapon(def));
        options.appendChild(card);
    });
    overlay.classList.add('visible');
}

function pickWeapon(def) {
    const isFirst =playerWeapons.length===1&&playerWeapons[0].id==='main_cannon';
    const existing=playerWeapons.find(w=>w.id===def.id);
    if (isFirst) {
        playerWeapons[0]={...def,lastShot:0,stackCount:1};
    } else if (existing) {
        existing.stackCount=(existing.stackCount||1)+1;
        existing.count     =(existing.count||1)+1;
        existing.cooldown  =Math.max(def.cooldown*0.4, existing.cooldown*0.82);
    } else {
        playerWeapons.push({...def,lastShot:0,stackCount:1});
    }
    document.getElementById('weapon-pick').classList.remove('visible');
    weaponPickOpen=false;
    updateWeaponBar();
}

function updateWeaponBar() {
    const bar=document.getElementById('weapon-bar');
    bar.innerHTML='';
    playerWeapons.forEach((w,i)=>{
        const slot=document.createElement('div');
        slot.className='weapon-slot'+(i===activeWeaponIndex?' active':'');
        slot.id=`wslot-${i}`;
        const stack=w.stackCount>1?`<div style="position:absolute;top:3px;right:5px;font-size:11px;color:#80cbc4;font-weight:bold;">x${w.stackCount}</div>`:'';
        slot.innerHTML=`<div class="icon">${w.icon}</div><div>${w.name}</div>${stack}
                        <div class="cooldown-overlay" id="wcd-${i}"></div>`;
        bar.appendChild(slot);
    });
}
updateWeaponBar();

function updateWeaponBarCooldowns() {
    const now=Date.now();
    playerWeapons.forEach((w,i)=>{
        const cd=document.getElementById(`wcd-${i}`);
        const sl=document.getElementById(`wslot-${i}`);
        if(!cd||!sl) return;
        const frac=Math.max(0,1-(now-(w.lastShot||0))/w.cooldown);
        cd.style.height=`${frac*100}%`;
        sl.className='weapon-slot'+(i===activeWeaponIndex?' active':'');
    });
}

// ════════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════════
const particles=[], levelUpParts=[];

function spawnHitParticles(wx,wy,color) {
    for(let i=0;i<5;i++){
        const a=Math.random()*Math.PI*2,s=Math.random()*3+1;
        particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20,maxLife:20,radius:Math.random()*4+2,color});
    }
}
function spawnDeathParticles(wx,wy,color) {
    for(let i=0;i<18;i++){
        const a=Math.random()*Math.PI*2,s=Math.random()*5+2;
        particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35,maxLife:35,radius:Math.random()*6+2,color});
    }
}
function spawnExplosionParticles(wx,wy) {
    for(let i=0;i<28;i++){
        const a=Math.random()*Math.PI*2,s=Math.random()*7+2;
        const c=['#ff7043','#ffb74d','#fff176','#ff5722'][Math.floor(Math.random()*4)];
        particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:40,maxLife:40,radius:Math.random()*8+3,color:c});
    }
}
function spawnLevelUpEffect() {
    for(let i=0;i<40;i++){
        const a=Math.random()*Math.PI*2,s=Math.random()*6+2;
        levelUpParts.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
                           life:50,maxLife:50,radius:Math.random()*5+2,
                           color:`hsl(${Math.random()*60+40},100%,70%)`});
    }
}
function updateParticles() {
    [particles,levelUpParts].forEach(arr=>{
        for(let i=arr.length-1;i>=0;i--){
            const p=arr[i];
            p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life--;
            if(p.life<=0) arr.splice(i,1);
        }
    });
}
function drawParticles(arr) {
    for(const p of arr){
        const{x:sx,y:sy}=worldToScreen(p.x,p.y);
        ctx.globalAlpha=p.life/p.maxLife;
        ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(sx,sy,p.radius*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
}

// ════════════════════════════════════════════════
//  UTILITY
// ════════════════════════════════════════════════
function drawBar(x,y,w,h,frac,colorFill,colorBg) {
    ctx.fillStyle=colorBg;
    ctx.beginPath();ctx.roundRect(x-w/2,y,w,h,3);ctx.fill();
    if(frac>0){
        ctx.fillStyle=colorFill;
        ctx.beginPath();ctx.roundRect(x-w/2,y,w*frac,h,3);ctx.fill();
    }
}

function drawCrosshair() {
    const x=mouse.x,y=mouse.y,r=10,g=4;
    ctx.strokeStyle='rgba(255,255,255,0.85)';
    ctx.lineWidth=1.5;
    ctx.shadowColor='#000';ctx.shadowBlur=3;
    ctx.beginPath();
    ctx.moveTo(x-r-g,y);ctx.lineTo(x-g,y);
    ctx.moveTo(x+g,y);  ctx.lineTo(x+r+g,y);
    ctx.moveTo(x,y-r-g);ctx.lineTo(x,y-g);
    ctx.moveTo(x,y+g);  ctx.lineTo(x,y+r+g);
    ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
}

// ════════════════════════════════════════════════
//  SPAWN LOOP
// ════════════════════════════════════════════════
let spawnTimer=0;
function handleSpawning() {
    const interval=Math.max(15, 70-level*3);
    spawnTimer++;
    if(spawnTimer>=interval){spawnTimer=0;spawnCluster();}
}
for(let i=0;i<8;i++) spawnCluster();

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
function gameLoop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBackground();

    if(!weaponPickOpen){
        updatePlayer();
        handleAutoFire();
        updateBullets();
        updateOrbs();
        updateParticles();
        updateEnemies();
        handleSpawning();
    }

    drawParticles(particles);
    drawParticles(levelUpParts);
    enemies.forEach(drawEnemy);
    drawOrbs();
    drawBullets();
    drawTank();
    drawCrosshair();
    updateWeaponBarCooldowns();

    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
